<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="img/favicon.png" type="image/png"/>
    <title>Player Profile - Rematch</title>
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <h1 id="player-title">Player Profile</h1>
        <a class="button-link" href="./index.html">Back to Home</a>
      </div>

      <div id="profile-message" class="message"></div>

      <section class="card" id="player-summary-card" hidden>
        <h2>Career Summary</h2>
        <div class="summary-grid" id="player-summary-grid"></div>
      </section>

      <section class="card" id="player-last10-card" hidden>
        <h2>Last 10 Games</h2>
        <div class="summary-grid" id="player-last10-grid"></div>
      </section>

      <section class="card" id="player-games-card" hidden>
        <h2>Recent Game Log</h2>
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Result</th>
              <th>Score</th>
              <th>G</th>
              <th>A</th>
              <th>P</th>
              <th>GS</th>
            </tr>
          </thead>
          <tbody id="player-games-body"></tbody>
        </table>
      </section>

      <section class="card" id="player-chemistry-card" hidden>
        <h2>Top Teammate Chemistry</h2>
        <table>
          <thead>
            <tr>
              <th>Teammate</th>
              <th>Shared GP</th>
              <th>W-L</th>
              <th>Your PPG Together</th>
            </tr>
          </thead>
          <tbody id="chemistry-body"></tbody>
        </table>
      </section>
    </div>

    <script type="module" src="./player.js"></script>
  </body>
</html>
